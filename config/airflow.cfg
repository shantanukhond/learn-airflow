# Local Airflow configuration (mounted at /opt/airflow/config/airflow.cfg).
# Airflow merges these values with built-in defaults.
# Docs: https://airflow.apache.org/docs/apache-airflow/stable/configurations-ref.html

[core]
executor = LocalExecutor
auth_manager = airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
dags_are_paused_at_creation = True
load_examples = False
execution_api_server_url = http://airflow-apiserver:8080/execution/

# Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
fernet_key =

[database]
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow@postgres/airflow

[api_auth]
# Must be identical across api-server, scheduler, dag-processor, and triggerer.
jwt_secret = airflow_jwt_secret
jwt_issuer = airflow

[scheduler]
enable_health_check = True
